<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPMB SMKN 1 WAY TENONG</title>
    <link rel="stylesheet" href="style.css?v=2.0">
</head>
<body>

    <div class="container">
        <div class="card" style="text-align: center;">
            
            <img src="logo_sekolah.png" alt="Logo SMKN 1 Way Tenong" class="logo" style="width: 100px; height: auto; display: block; margin: 0 auto 20px auto;">

            <h2>PENGUMUMAN SISTEM PENERIMAAN MURID BARU</h2>
            <h2>(SPMB)</h2>
            <h3>SMKN 1 WAY TENONG</h3>
            <p class="ta">Tahun Ajaran 2026/2027</p>
            
            <div class="underline" style="margin: 0 auto 25px auto;"></div>

            <p class="instruction">Masukkan NISN resmi Anda untuk verifikasi data:</p>

            <input type="text" id="nisnInput" name="nisn" placeholder="Contoh: 0078010691" maxlength="10">

            <button onclick="if(typeof cekKelulusan === 'function'){ cekKelulusan(); } else if(typeof cek_kelulusan === 'function'){ cek_kelulusan(); } else { alert('Skrip sistem belum termuat sempurna, silakan refresh halaman (Ctrl+F5)'); }" class="btn-glow" style="cursor: pointer; width: 100%; display: block;">
                CEK HASIL SELEKSI
            </button>

            <div id="result-container" style="margin-top: 25px; text-align: left;"></div>
            
            <p id="errorMsg" class="error hidden">Data tidak ditemukan, periksa kembali nomor Anda.</p>
            
        </div>
    </div>

    <script src="script.js?v=2.0"></script>
</body>
</html>
