<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <!-- TAMBAHKAN BARIS INI DI BAWAH -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Pengumuman Kelulusan Kelas XII SMKN 1 Way Tenong</title>
    <link rel="stylesheet" href="style.css">
    ...
</head>
<body>
    <!-- Background Decor -->
    <div class="circle circle-1"></div>
    <div class="circle circle-2"></div>

    <div class="glass-card">
        <div class="logo">
    <img src="logo_sekolah.png" alt="Logo SMKN 1 Way Tenong" class="img-logo">
</div>
        <h1 class="main-title">PENGUMUMAN KELULUSAN KELAS XII</h1>
    <h2 class="school-name">SMKN 1 WAY TENONG</h2>
    <p class="academic-year">Tahun Ajaran 2025/2026</p>
        <div class="separator"></div>

        <!-- Stopwatch Style Timer -->
        <div id="timer-wrapper">
            <p class="status-text">PENGUMUMAN AKAN TERBUKA DALAM</p>
            <div class="stopwatch">
                <div class="unit">
                    <span id="days">00</span>
                    <label>HARI</label>
                </div>
                <div class="colon">:</div>
                <div class="unit">
                    <span id="hours">00</span>
                    <label>JAM</label>
                </div>
                <div class="colon">:</div>
                <div class="unit">
                    <span id="minutes">00</span>
                    <label>MENIT</label>
                </div>
                <div class="colon">:</div>
                <div class="unit">
                    <span id="seconds">00</span>
                    <label>DETIK</label>
                </div>
            </div>
        </div>

        <!-- Bagian Input NISN -->
<div id="download-section" class="hidden">
    <div id="result-container">
        <p>Masukkan NISN resmi Anda untuk verifikasi data:</p>
        <div class="input-group">
            <input type="text" id="nisnInput" placeholder="Contoh: 0012345678" maxlength="10">
            <!-- Tombol pertama: Cek Kelulusan -->
            <button id="mainBtn" onclick="cekKelulusan()" class="btn-glow">CEK KELULUSAN</button>
        </div>
    </div>
    <p id="errorMsg" class="error-text hidden">⚠️ NISN tidak terdaftar. Hubungi Admin Sekolah.</p>
</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
